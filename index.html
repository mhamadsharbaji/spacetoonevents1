<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Horizon Collage | Centered Nav & Immersive Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #22247c);
            position: relative;
        }

        /* ========= CENTERED NAVIGATION BAR (top center) ========= */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 24px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            width: auto;
            max-width: 90vw;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links li a {
            color: #f0f0f0;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 8px 6px;
            transition: all 0.25s ease;
            position: relative;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .nav-links li a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, #7bfffd, #53edea);
            transition: width 0.25s ease, left 0.25s ease;
            border-radius: 2px;
        }

        .nav-links li a:hover {
            color: #7dd9d7;
            transform: translateY(-1px);
        }

        .nav-links li a:hover::after {
            width: 70%;
            left: 15%;
        }

        /* Responsive nav adjustments */
        @media (max-width: 780px) {
            .nav-bar {
                top: 12px;
                padding: 6px 18px;
                border-radius: 50px;
            }
            .nav-links {
                gap: 16px;
            }
            .nav-links li a {
                font-size: 0.8rem;
                padding: 5px 4px;
            }
        }

        @media (max-width: 580px) {
            .nav-bar {
                top: 10px;
                padding: 5px 12px;
            }
            .nav-links {
                gap: 10px;
            }
            .nav-links li a {
                font-size: 0.7rem;
                padding: 4px 3px;
                white-space: nowrap;
            }
        }

        /* Main collage grid - full viewport, no scroll */
        .collage {
            position: relative;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            padding: 16px;
            padding-top: 90px;  /* Space for fixed nav */
            z-index: 2;
        }

        /* Card styling - ultra smooth performance */
        .card {
            position: relative;
            background: rgba(15, 20, 35, 0.3);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.05), box-shadow 0.3s ease;
            cursor: pointer;
            animation: fadeGlideUp 0.6s ease-out backwards;
            will-change: transform;
            backface-visibility: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), filter 0.3s ease;
            filter: brightness(0.94) saturate(1.05);
            will-change: transform;
            backface-visibility: hidden;
        }

        /* Overlay with subtle gradient */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,245,0.05) 0%, rgba(0,0,0,0.3) 90%);
            pointer-events: none;
            transition: opacity 0.3s ease;
            opacity: 0.45;
            border-radius: inherit;
        }

        .card:hover {
            transform: scale(1.02) translateY(-4px);
            box-shadow: 0 28px 40px -14px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,210,120,0.5) inset;
            z-index: 15;
        }

        .card:hover img {
            transform: scale(1.06);
            filter: brightness(1.04) saturate(1.12);
        }

        .card:hover::after {
            opacity: 0.2;
        }

        /* Caption with light blur */
        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.2), transparent);
            padding: 22px 14px 12px 14px;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.8px;
            backdrop-filter: blur(4px);
            transform: translateY(0);
            transition: backdrop-filter 0.2s ease, transform 0.25s ease;
            border-radius: 0 0 28px 28px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
        }

        .card:hover .caption {
            transform: translateY(-2px);
            backdrop-filter: blur(8px);
        }

        /* Artistic Asymmetrical Grid Placements - Desktop */
        .card-1 { grid-column: 1 / 3; grid-row: 1 / 3; }
        .card-2 { grid-column: 3 / 5; grid-row: 1 / 2; }
        .card-3 { grid-column: 5 / 7; grid-row: 1 / 3; }
        .card-4 { grid-column: 3 / 4; grid-row: 2 / 3; }
        .card-5 { grid-column: 4 / 5; grid-row: 2 / 3; }
        .card-6 { grid-column: 1 / 2; grid-row: 3 / 4; }
        .card-7 { grid-column: 2 / 4; grid-row: 3 / 5; }
        .card-8 { grid-column: 4 / 6; grid-row: 3 / 4; }
        .card-9 { grid-column: 6 / 7; grid-row: 3 / 5; }
        .card-10 { grid-column: 1 / 2; grid-row: 4 / 5; }
        .card-11 { grid-column: 4 / 6; grid-row: 4 / 5; }

        @keyframes fadeGlideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Staggered delays */
        .card-1 { animation-delay: 0.02s; }
        .card-2 { animation-delay: 0.06s; }
        .card-3 { animation-delay: 0.10s; }
        .card-4 { animation-delay: 0.14s; }
        .card-5 { animation-delay: 0.18s; }
        .card-6 { animation-delay: 0.22s; }
        .card-7 { animation-delay: 0.26s; }
        .card-8 { animation-delay: 0.30s; }
        .card-9 { animation-delay: 0.34s; }
        .card-10 { animation-delay: 0.38s; }
        .card-11 { animation-delay: 0.42s; }

        /* Ambient blur background orbs */
        .ambient-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 55vmin;
            height: 55vmin;
            background: radial-gradient(circle, rgba(255,140,180,0.25), rgba(80,70,220,0.08));
            filter: blur(70px);
            border-radius: 60% 40% 70% 30%;
            animation: floatBlob 22s infinite alternate ease-in-out;
            will-change: transform;
        }

        .blob1 { top: 5%; left: -12%; background: radial-gradient(circle, #ff9a7a88, #b04adf22); animation-duration: 25s; }
        .blob2 { bottom: 0%; right: -8%; width: 70vmin; height: 70vmin; background: radial-gradient(circle, #3bc9ff44, #7c3eff22); filter: blur(85px); animation-duration: 30s; animation-delay: -4s; }
        .blob3 { top: 45%; left: 25%; width: 48vmin; height: 48vmin; background: radial-gradient(circle, #f5e97a55, #e06eff33); filter: blur(65px); animation-duration: 23s; animation-delay: -6s; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(8%, 10%) rotate(6deg) scale(1.15); }
        }

        /* Ripple effect */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,245,190,0.7) 2%, rgba(255,200,100,0) 70%);
            transform: scale(0);
            animation: rippleAnim 0.55s linear forwards;
            pointer-events: none;
            z-index: 25;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(8);
                opacity: 0;
            }
        }

        /* ========== RESPONSIVE (collage adjustments with nav spacing) ========= */
        @media (max-width: 1024px) {
            .collage { gap: 8px; padding: 12px; padding-top: 85px; }
            .caption { font-size: 0.72rem; padding: 16px 10px 8px; backdrop-filter: blur(3px); }
            .card { border-radius: 22px; }
        }

        @media (max-width: 768px) {
            .collage {
                gap: 7px;
                padding: 10px;
                padding-top: 80px;
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }
            .card-1 { grid-column: 1 / 3; grid-row: 1 / 3; }
            .card-2 { grid-column: 3 / 5; grid-row: 1 / 2; }
            .card-3 { grid-column: 3 / 5; grid-row: 2 / 4; }
            .card-4 { grid-column: 1 / 2; grid-row: 3 / 4; }
            .card-5 { grid-column: 2 / 3; grid-row: 3 / 4; }
            .card-6 { grid-column: 1 / 2; grid-row: 4 / 5; }
            .card-7 { grid-column: 2 / 4; grid-row: 4 / 6; }
            .card-8 { grid-column: 4 / 5; grid-row: 4 / 5; }
            .card-9 { grid-column: 3 / 5; grid-row: 6 / 7; }
            .card-10 { grid-column: 1 / 2; grid-row: 5 / 6; }
            .card-11 { grid-column: 4 / 5; grid-row: 5 / 6; }
            .caption { font-size: 0.68rem; padding: 12px 7px 6px; backdrop-filter: blur(3px); }
            .card { border-radius: 18px; }
        }

        @media (max-width: 480px) {
            .collage {
                gap: 5px;
                padding: 8px;
                padding-top: 70px;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: repeat(8, 1fr);
            }
            .card-1 { grid-column: 1 / 3; grid-row: 1 / 3; }
            .card-2 { grid-column: 3 / 4; grid-row: 1 / 2; }
            .card-3 { grid-column: 2 / 4; grid-row: 3 / 5; }
            .card-4 { grid-column: 1 / 2; grid-row: 3 / 4; }
            .card-5 { grid-column: 3 / 4; grid-row: 2 / 3; }
            .card-6 { grid-column: 1 / 2; grid-row: 4 / 5; }
            .card-7 { grid-column: 1 / 3; grid-row: 5 / 7; }
            .card-8 { grid-column: 3 / 4; grid-row: 5 / 6; }
            .card-9 { grid-column: 2 / 3; grid-row: 7 / 8; }
            .card-10 { grid-column: 1 / 2; grid-row: 7 / 8; }
            .card-11 { grid-column: 3 / 4; grid-row: 6 / 8; }
            .caption { font-size: 0.58rem; padding: 10px 5px 5px; backdrop-filter: blur(2px); }
            .card { border-radius: 14px; }
        }

        /* Hardware acceleration */
        .card, .card img, .caption {
            transform: translateZ(0);
        }

        /* Text-only card styling (no background text block) */
        .text-card-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            z-index: 3;
            transition: all 0.3s ease;
            border-radius: inherit;
            pointer-events: none; /* Allows clicks to pass to card layer for ripple */
        }
        .text-card-content span {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            background: transparent;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            text-align: center;
            padding: 0 12px;
            word-break: keep-all;
        }
        
        /* ----- MAKE ALL THREE TEXT CARDS (FESTIVALS, SPACETOON EVENTS, CONCERTS) SMALLER ----- */
        .card-5 .text-card-content span,
        .card-6 .text-card-content span,
        .card-9 .text-card-content span {
            font-size: 1.55rem;  /* Reduced from 2rem to 1.25rem for all three */
            letter-spacing: 0.09em;
        }
        
        /* Adjust text size for medium screens */
        @media (max-width: 1024px) {
            .card-5 .text-card-content span,
            .card-6 .text-card-content span,
            .card-9 .text-card-content span {
                font-size: 1.1rem;
                letter-spacing: 0.08em;
            }
        }
        
        /* adjust text size for smaller screens (tablet) */
        @media (max-width: 768px) {
            .text-card-content span { font-size: 1rem; letter-spacing: 0.07em; }
            .card-5 .text-card-content span,
            .card-6 .text-card-content span,
            .card-9 .text-card-content span {
                font-size: 0.9rem;
                letter-spacing: 0.07em;
            }
        }
        
        @media (max-width: 580px) {
            .text-card-content span { font-size: 0.85rem; letter-spacing: 0.05em; }
            .card-5 .text-card-content span,
            .card-6 .text-card-content span,
            .card-9 .text-card-content span {
                font-size: 0.75rem;
                letter-spacing: 0.05em;
            }
        }
        
        /* General text-card hover effect */
        .card.text-only-card:hover .text-card-content {
            backdrop-filter: blur(8px);
            background: rgba(0, 0, 0, 0.3);
        }
        .card.text-only-card:hover .text-card-content span {
            transform: scale(1.02);
            text-shadow: 0 0 12px rgba(255,210,90,0.9);
            transition: 0.2s;
        }
        /* hide original image + caption in text cards */
        .card.text-only-card img {
            opacity: 0;
            visibility: hidden;
        }
        .card.text-only-card .caption {
            display: none;
        }
        .card.text-only-card::after {
            opacity: 0.6;
            background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(60,40,100,0.5));
        }
    </style>
</head>
<body>

<div class="ambient-blur">

<!-- CENTERED NAVIGATION BAR WITH 6 LINKS (unchanged) -->
<nav class="nav-bar">

<script>
    (function() {
        // PROFESSIONAL SCRIPT: Smooth interactions, nav behavior, ripple effect, no lag
        const cards = document.querySelectorAll('.card');
        const navLinks = document.querySelectorAll('.nav-links li a');
        
        // Create lightweight ripple effect (unchanged)
        function createRipple(event, element) {
            const rect = element.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            let clientX, clientY;
            
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            
            const x = clientX - rect.left - size / 2;
            const y = clientY - rect.top - size / 2;
            
            const ripple = document.createElement('div');
            ripple.classList.add('ripple-effect');
            ripple.style.width = `${size}px`;
            ripple.style.height = `${size}px`;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            ripple.style.position = 'absolute';
            ripple.style.pointerEvents = 'none';
            element.style.position = 'relative';
            element.style.overflow = 'hidden';
            element.appendChild(ripple);
            
            setTimeout(() => {
                if (ripple && ripple.remove) ripple.remove();
            }, 550);
        }
        
        // Attach click/tap handlers to cards (works for both image and text cards)
        cards.forEach(card => {
            const handleClickOrTap = (e) => {
                if (e.type === 'click' || e.type === 'touchstart') {
                    e.stopPropagation();
                    createRipple(e, card);
                    // For text-only cards, apply visual pop effect on the text overlay
                    const isTextCard = card.classList.contains('text-only-card');
                    if (isTextCard) {
                        const textSpan = card.querySelector('.text-card-content span');
                        if (textSpan) {
                            textSpan.style.transition = 'transform 0.12s ease, text-shadow 0.1s';
                            textSpan.style.transform = 'scale(1.05)';
                            textSpan.style.textShadow = '0 0 15px rgba(255,220,100,0.9)';
                            setTimeout(() => {
                                if (textSpan) {
                                    textSpan.style.transform = '';
                                    textSpan.style.textShadow = '';
                                }
                            }, 150);
                        }
                    } else {
                        const imgEl = card.querySelector('img');
                        if (imgEl && imgEl.style) {
                            imgEl.style.transition = 'filter 0.15s';
                            imgEl.style.filter = 'brightness(1.1) saturate(1.2)';
                            setTimeout(() => {
                                if (imgEl) imgEl.style.filter = '';
                            }, 180);
                        }
                    }
                    const title = card.querySelector('.caption')?.innerText || 
                                 (card.classList.contains('text-only-card') ? 
                                 (card.querySelector('.text-card-content span')?.innerText || 'artwork') : 'artwork');
                    console.log(`✨ Exploring: ${title}`);
                }
            };
            card.addEventListener('click', handleClickOrTap);
            card.addEventListener('touchstart', handleClickOrTap, { passive: false });
        });
        
        // Nav links interactive feedback - unchanged
        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = link.getAttribute('data-section');
                navLinks.forEach(l => l.style.color = '');
                link.style.color = '#ffdd99';
                setTimeout(() => {
                    link.style.color = '';
                }, 300);
                console.log(`🔗 Navigation: ${section.toUpperCase()} section (demo interaction)`);
                showNavToast(`✨ ${link.innerText} ✨`);
            });
        });
        
        // Tiny toast notif for nav
        function showNavToast(message) {
            let toast = document.querySelector('.nav-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'nav-toast';
                toast.style.position = 'fixed';
                toast.style.bottom = '30px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.background = 'rgba(0,0,0,0.7)';
                toast.style.backdropFilter = 'blur(12px)';
                toast.style.color = '#ffe6cc';
                toast.style.padding = '8px 20px';
                toast.style.borderRadius = '40px';
                toast.style.fontSize = '0.85rem';
                toast.style.fontWeight = '500';
                toast.style.zIndex = '200';
                toast.style.fontFamily = 'inherit';
                toast.style.pointerEvents = 'none';
                toast.style.whiteSpace = 'nowrap';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';
            toast.style.transition = 'opacity 0.2s';
            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.style.opacity = '0';
            }, 1500);
        }
        
        // Background blob parallax (desktop only)
        let isMobile = false;
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) isMobile = true;
        
        if (!isMobile) {
            let ticking = false;
            document.addEventListener('mousemove', (e) => {
                if (!ticking) {
                    requestAnimationFrame(() => {
                        const x = e.clientX / window.innerWidth;
                        const y = e.clientY / window.innerHeight;
                        const blobs = document.querySelectorAll('.blob');
                        if (blobs.length >= 3) {
                            blobs[0].style.transform = `translate(${x * 10 - 5}px, ${y * 7 - 3.5}px)`;
                            blobs[1].style.transform = `translate(${x * -8 + 4}px, ${y * 12 - 6}px)`;
                            blobs[2].style.transform = `translate(${x * 6 - 3}px, ${y * -8 + 4}px)`;
                        }
                        ticking = false;
                    });
                    ticking = true;
                }
            });
        }
        
        // Lock viewport height (no scrolling)
        function lockViewportHeight() {
            const vh = window.innerHeight;
            document.body.style.height = `${vh}px`;
            document.documentElement.style.height = `${vh}px`;
        }
        window.addEventListener('resize', lockViewportHeight);
        lockViewportHeight();
        
        // Prevent touch overscroll
        document.body.addEventListener('touchmove', (e) => {
            if (document.body.scrollHeight <= window.innerHeight) e.preventDefault();
        }, { passive: false });
        
        // Fallback for missing images (only on cards that are not text-only, and have visible img)
        const visibleImages = document.querySelectorAll('.card:not(.text-only-card) img');
        visibleImages.forEach((img, idx) => {
            img.addEventListener('error', () => {
                console.log(`Note: local image ${img.src} not found, using placeholder. Place 1.jpg-10.jpg in folder.`);
            });
            if (idx > 5 && 'loading' in HTMLImageElement.prototype) img.loading = 'lazy';
        });
        
        // Keyboard easter egg: press R for random ripple
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                const randomCard = cards[Math.floor(Math.random() * cards.length)];
                const rect = randomCard.getBoundingClientRect();
                createRipple({ clientX: rect.left + rect.width/2, clientY: rect.top + rect.height/2, touches: null }, randomCard);
                randomCard.style.transform = 'scale(1.01)';
                setTimeout(() => { if(randomCard) randomCard.style.transform = ''; }, 150);
            }
        });
        
        console.log('✨ PRO COLLAGE | Updated: "Festivals", "Spacetoon Events", "Concerts" with reduced, balanced text sizes. Everything else unchanged ✨');
        
        let warmup = false;
        const warmGPU = () => {
            if(warmup) return;
            const div = document.createElement('div');
            div.style.transform = 'translateZ(0)';
            div.style.opacity = '0.99';
            document.body.appendChild(div);
            setTimeout(() => document.body.removeChild(div), 40);
            warmup = true;
        };
        document.addEventListener('touchstart', warmGPU, { once: true });
        document.addEventListener('mousemove', warmGPU, { once: true });
    })();
</script>
</body>
</html>
